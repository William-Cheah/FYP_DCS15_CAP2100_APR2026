<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel-Eye | Employee Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:15px;">
            <div>
                <h2>Employee Management</h2>
                <p style="color:#64748b; font-size:0.83em; margin:4px 0 0 0;">
                    Edit profiles and deactivate employees. To add a new employee, use
                    <a href="register.html" style="color:#38bdf8;">Register Account</a>.
                </p>
            </div>
        </header>

        <!-- Search -->
        <div style="margin-bottom:16px;">
            <input type="text" id="emp-search" placeholder="Search name or ID..."
                   style="padding:9px 14px; border-radius:20px; border:1px solid #334155;
                          background:#1e293b; color:white; outline:none; width:260px;">
        </div>

        <!-- Table -->
        <div class="roster-table-wrapper">
            <table class="roster-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Employee ID</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Employment Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="emp-tbody">
                    <tr><td colspan="7" style="text-align:center; color:#64748b; padding:30px;">Syncing data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add / Edit Modal -->
<div id="emp-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
     z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1e293b; border:1px solid #334155; border-radius:12px;
                padding:28px; width:90%; max-width:520px; max-height:90vh; overflow-y:auto;">
        <h3 id="modal-heading" style="color:white; margin:0 0 20px 0;">Add Employee</h3>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">
            <div>
                <label class="form-label">Full Name *</label>
                <input id="f-name" class="form-input" type="text" placeholder="e.g. Ahmad bin Ali">
            </div>
            <div>
                <label class="form-label">Employee ID *</label>
                <input id="f-id" class="form-input" type="text" placeholder="e.g. emp002">
            </div>
            <div>
                <label class="form-label">Email *</label>
                <input id="f-email" class="form-input" type="email" placeholder="email@company.com">
            </div>
            <div>
                <label class="form-label">Role</label>
                <select id="f-role" class="form-input">
                    <option value="Employee">Employee</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div>
                <label class="form-label">Department</label>
                <input id="f-dept" class="form-input" type="text" placeholder="e.g. Construction">
            </div>
            <div>
                <label class="form-label">Employment Status</label>
                <select id="f-empstatus" class="form-input">
                    <option value="Active">Active</option>
                    <option value="Suspended">Suspended</option>
                </select>
            </div>
        </div>

        <div id="modal-error" style="display:none; color:#ef4444; font-size:0.82em; margin-bottom:12px;"></div>

        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="closeEmpModal()"
                    style="padding:9px 22px; background:#334155; color:#e2e8f0;
                           border:none; border-radius:8px; cursor:pointer;">Cancel</button>
            <button id="modal-save-btn" onclick="saveEmployee()"
                    style="padding:9px 22px; background:#3b82f6; color:white;
                           border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
                Save
            </button>
        </div>
    </div>
</div>

<!-- Confirm delete modal -->
<div id="del-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
     z-index:1001; justify-content:center; align-items:center;">
    <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:28px; max-width:400px; width:90%;">
        <h3 style="color:#ef4444; margin:0 0 10px 0;">Deactivate Employee</h3>
        <p id="del-msg" style="color:#94a3b8; margin:0 0 20px 0;"></p>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="document.getElementById('del-modal').style.display='none'"
                    style="padding:8px 20px; background:#334155; color:#e2e8f0;
                           border:none; border-radius:8px; cursor:pointer;">Cancel</button>
            <button id="del-confirm-btn"
                    style="padding:8px 20px; background:#ef4444; color:white;
                           border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
                Deactivate
            </button>
        </div>
    </div>
</div>

<script type="module" src="../js/employees.js"></script>
<script type="module" src="../js/sidebar.js"></script>
</body>
</html>
